services:
  - type: web
    name: ai-news-aggregator
    runtime: python
    plan: free
    buildCommand: pip install -e .
    startCommand: alembic upgrade head && uvicorn src.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-news-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO

databases:
  - name: ai-news-db
    plan: free
    databaseName: news_aggregator
    user: aggregator
