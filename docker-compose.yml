services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: news_aggregator
      POSTGRES_USER: aggregator
      POSTGRES_PASSWORD: ${DB_PASSWORD:-aggregator}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aggregator -d news_aggregator"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://aggregator:${DB_PASSWORD:-aggregator}@postgres:5432/news_aggregator
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ENVIRONMENT: ${ENVIRONMENT:-production}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped

  # Optional: run Alembic migrations before app starts
  migrate:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://aggregator:${DB_PASSWORD:-aggregator}@postgres:5432/news_aggregator
    depends_on:
      postgres:
        condition: service_healthy
    command: alembic upgrade head
    restart: "no"

volumes:
  pgdata:
