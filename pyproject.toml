[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ai-news-aggregator"
version = "0.1.0"
description = "AI-powered news aggregator with automated analysis and daily reports"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.34.0",
    "sqlalchemy[asyncio]>=2.0.36",
    "asyncpg>=0.30.0",
    "alembic>=1.14.0",
    "pydantic>=2.10.0",
    "pydantic-settings>=2.7.0",
    "httpx>=0.28.0",
    "feedparser>=6.0.11",
    "beautifulsoup4>=4.12.0",
    "lxml>=5.3.0",
    "apscheduler>=3.10,<4.0",
    "anthropic>=0.40.0",
    "openai>=1.58.0",
    "jinja2>=3.1.0",
    "markdown-it-py>=3.0.0",
    "structlog>=24.4.0",
    "python-dotenv>=1.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24.0",
    "pytest-cov>=6.0",
    "ruff>=0.8.0",
    "httpx-sse>=0.4.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP", "B", "C4"]
ignore = ["N818"]  # Custom exception names don't need "Error" suffix

[tool.ruff.lint.per-file-ignores]
"alembic/versions/*.py" = ["E501"]       # Auto-generated migration files
"src/api/*.py" = ["B008"]                # FastAPI Depends in defaults is standard
"tests/*.py" = ["B008"]                  # Test fixtures with Depends

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
